[pytest]
# pytest 配置文件

# 测试目录
testpaths = tests

# 测试文件模式
python_files = test_*.py

# 测试类模式
python_classes = Test

# 测试函数模式
python_functions = test_*

# 警告过滤
filterwarnings =
    # 忽略 FastAPI TestClient 的 httpx 弃用警告
    ignore::starlette.exceptions.StarletteDeprecationWarning
    
    # 忽略其他常见的弃用警告（可选）
    ignore::DeprecationWarning

# 测试报告选项
addopts = 
    -v
    --tb=short
    --strict-markers

# 标记定义
markers =
    asyncio: 异步测试
    slow: 慢速测试
    integration: 集成测试
