[global]
config_version = 2

[provider_strong]
type = ollama
endpoint = http://192.168.71.11:11434/api/chat
api_key = 
model = qwen3.5:9b
temperature = 0.5
max_tokens = 4096
timeout = 120

[provider_medium]
type = ollama
endpoint = http://192.168.71.11:11434/api/chat
api_key = 
model = qwen3.5:9b
temperature = 0.7
max_tokens = 2048
timeout = 120

[provider_light]
type = ollama
endpoint = http://192.168.71.11:11434/api/chat
api_key = 
model = qwen3.5:9b
temperature = 0.8
max_tokens = 512
timeout = 60

[retry]
max_retries = 3
base_delay = 1.0

[oracle]
trigger_interval = 5

[v4]
enabled = true

[refinement]
enabled = true
max_warning_refine = 1
max_fail_rewrite = 2

[best_of_3]
enabled = true
sample_count = 3
scorer_min_total = 8

[multi_view]
enabled = false

[dynamic_tier]
enabled = false
complexity_threshold_simple = 0.3
complexity_threshold_complex = 0.5

[semantic_selection]
enabled = false
max_canon_tokens = 1200

[memory]
enable_vector_memory = false
embed_model = nomic-embed-text
vector_top_k = 3
max_vector_entries = 500

[micro_oracle]
enabled = true

[anti_rules]
enabled = false

[performance]
auto_degrade_enabled = true
sample_count_degrade_1 = 2
sample_count_degrade_2 = 1
multi_view_degrade_1 = false
