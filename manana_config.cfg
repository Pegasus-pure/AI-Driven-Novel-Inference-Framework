; ============================================================
; MaNA v4 配置文件
; 所有 v4 功能默认关闭（v3 兼容模式），逐项开启后生效
; 模型约束: 仅 qwen3.5:9b（所有 tier 同模型，temperature/max_tokens 区分）
; ============================================================

[global]

; 配置版本号（内部迁移用，请勿手动修改）
config_version=2

; ============================================================
; 三级模型 Provider（对话用，统一使用 qwen3.5:9b）
; ============================================================

[provider_strong]
; 强推理层 — Director(节拍导演) / Composer(叙事编织) / Oracle(反思神谕)
type="ollama"
endpoint="http://192.168.71.11:11434/api/chat"
api_key=""
model="qwen3.5:9b"
temperature=0.5
max_tokens=4096
timeout=120

[provider_medium]
; 中等推理层 — Motivation(动机分析) / Dialogue(对话生成) / Auditor(一致性审计) / Thread(线索管理)
type="ollama"
endpoint="http://192.168.71.11:11434/api/chat"
api_key=""
model="qwen3.5:9b"
temperature=0.7
max_tokens=2048
timeout=120

[provider_light]
; 轻量推理层 — ActionDirector(动作编排) / StateExtractor(状态提取) / Scorer(评分)
type="ollama"
endpoint="http://192.168.71.11:11434/api/chat"
api_key=""
model="qwen3.5:9b"
temperature=0.8
max_tokens=512
timeout=60

; ============================================================
; 重试策略
; ============================================================

[retry]

; 最大重试次数
max_retries=3
; 重试基础延迟（秒），指数退避
base_delay=1.0

; ============================================================
; 反思神谕（v3 保留）
; ============================================================

[oracle]

; 每 N 个节拍触发一次全局叙事健康评估
trigger_interval=5

; ============================================================
; MaNA v4 功能开关 — 总控
; ============================================================

[v4]
; v4 总开关: false = 完全走 v3 路径，true = 启用下方各子功能
enabled=false

; ============================================================
; P0-1: 迭代精炼循环 — Composer 输出 → Auditor 检查 → 不满意则重写
; ============================================================

[refinement]
; WARNING 级别最多微调轮数
enabled=true
max_warning_refine=1
; FAIL 级别最多重写轮数
max_fail_rewrite=2

; ============================================================
; P0-2: 多采样自洽 — Director 并行跑 3 次，Scorer 选最优
; ============================================================

[best_of_3]
enabled=true
; 采样数量（2 或 3）
sample_count=3
; Scorer 最低总分阈值（1-15），低于此值全部重跑
scorer_min_total=8

; ============================================================
; P1-1: 微 Oracle — 每拍一句话质量反馈
; ============================================================

[micro_oracle]
enabled=false

; ============================================================
; P1-2: 动态 Tier 升级 — 复杂场景自动降 temperature / 加 max_tokens
; ============================================================

[dynamic_tier]
enabled=true
; 复杂度 < 此值 → 降级到 medium/light tier
complexity_threshold_simple=0.3
; 复杂度 > 此值 → 升级到 strong tier + 低 temperature
complexity_threshold_complex=0.5

; ============================================================
; P1-3: 多视角合成 — plot-driven + character-driven 双视角融合
; ============================================================

[multi_view]
enabled=true

; ============================================================
; P2-1: 语义 Canon 选择 — LLM 筛选与当前场景最相关的背景信息
; ============================================================

[semantic_selection]
enabled=false
; canon 注入的最大 token 预算
max_canon_tokens=1200

; ============================================================
; P2-2: 角色防崩卡 — 反例规则（anti_rules）约束角色行为
; ============================================================

[anti_rules]
enabled=false

; ============================================================
; 向量记忆系统 — Ollama Embedding 语义检索
; ============================================================

[memory]
; 是否启用向量记忆（需先 ollama pull 对应模型）
enable_vector_memory=false
; 嵌入模型: qwen3-embedding:0.6b（推荐，与 qwen3.5:9b 同族共享词表）
; 备选: nomic-embed-text, bge-m3, qwen3-embedding:4b
embed_model="qwen3-embedding:0.6b"
; 每次检索返回的历史场景数
vector_top_k=3
; 向量缓存上限（LRU 淘汰）
max_vector_entries=500

; ============================================================
; 性能自动降级 — 硬件撑不住时自动减配
; ============================================================

[performance]
; 是否启用自动降级（建议开启）
auto_degrade_enabled=true
; 降级等级 1: Director 采样数从 3 降到 2
sample_count_degrade_1=2
; 降级等级 2: Director 采样数从 2 降到 1（退化为 v3 单次调用）
sample_count_degrade_2=1
; 降级等级 1: 是否关闭多视角合成
multi_view_degrade_1=false
